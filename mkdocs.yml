site_name: HyperAgents Docs
site_description: HyperAgents project documentation portal
site_url: https://monkeyhlj.github.io/HyperAgents/
repo_url: https://github.com/monkeyhlj/HyperAgents
repo_name: monkeyhlj/HyperAgents

docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Quick Start: guides/quick-start.zh-en.md
  - Role-based Reading: roles/roles-overview.zh-en.md
  - Developer Playbook: roles/developer-playbook.zh-en.md
  - QA Playbook: roles/qa-playbook.zh-en.md
  - Ops Playbook: roles/ops-playbook.zh-en.md
  - PM Playbook: roles/pm-playbook.zh-en.md
  - Frontend Guide: guides/frontend-guide.zh-en.md
  - Runtime Run and Worker: guides/runtime-run-worker.zh-en.md
  - API Changelog: reference/api-changelog.zh-en.md
  - Deployment and Operations: operations/deployment-operations.zh-en.md
  - Testing Playbook: guides/testing-playbook.zh-en.md
  - Architecture Roadmap: reference/architecture-roadmap.zh-en.md
  - External Integration: guides/external-resources-integration.zh-en.md
  - Node Docs:
      - 01 Project and Members: nodes/01-project-and-members.zh-en.md
      - 02 Resource and Registry: nodes/02-resource-and-registry.zh-en.md
      - 03 Chat and Runtime: nodes/03-chat-and-runtime.zh-en.md
      - 04 Memory System: nodes/04-memory-system.zh-en.md
      - 05 Provider Layer: nodes/05-provider-layer.zh-en.md
      - 06 Database and Migrations: nodes/06-database-and-migrations.zh-en.md
  - Docs Portal: README.md
